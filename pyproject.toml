[project]
name = "bridge"
version = "0.1.0"
description = "Bridge — Local real-time voice-to-voice translation: Whisper + Ollama + Kokoro-82M"
requires-python = ">=3.10"

dependencies = [
    # ── Web framework ──────────────────────────────────────────
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "websockets>=12.0",
    # ── STT ────────────────────────────────────────────────────
    # faster-whisper ships CTranslate2; install the CUDA variant
    # by running: uv add faster-whisper --extra cuda
    "faster-whisper>=1.0.3",
    # ── Audio I/O ──────────────────────────────────────────────
    "soundfile>=0.12.1",   # WebM/Opus decode via libsndfile
    "numpy>=1.26.0",
    # ── Optional: better resampling (fallback to numpy if absent)
    # "resampy>=0.4.3",
    # ── Translation ────────────────────────────────────────────
    "httpx>=0.27.0",       # async Ollama REST calls
    # Alternative: "ollama>=0.2.0"
    # ── TTS ────────────────────────────────────────────────────
    # Install one of:
    #   uv add kokoro-onnx          (ONNX runtime, easiest on Windows)
    #   uv add kokoro               (PyTorch, higher quality)
    # "kokoro-onnx>=0.4.0",
    "kokoro-onnx>=0.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.uv]
# Windows-specific CUDA override for faster-whisper / CTranslate2
# After `uv sync`, run:
#   pip install ctranslate2 --index-url https://download.pytorch.org/whl/cu121
index-url = "https://pypi.org/simple"
